name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: typecheck
        run: pnpm -r typecheck

      - name: lint
        run: pnpm lint

      - name: test
        run: pnpm test

      - name: build
        run: pnpm build

      - name: docs-lint
        run: pnpm docs:lint

  # Mutation testing runs as its own job so it never slows the gate. It's the real
  # measure of test strength — see CLAUDE.md → Mutation testing.
  mutation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: mutation testing (Stryker)
        run: pnpm mutation
