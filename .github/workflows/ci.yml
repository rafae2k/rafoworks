name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: typecheck
        run: pnpm -r typecheck

      - name: lint
        run: pnpm lint

      - name: test
        run: pnpm test

      - name: docs-lint
        run: pnpm docs:lint

      - name: scrub (no private identifiers)
        run: pnpm scrub
